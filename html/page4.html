<!DOCTYPE html>
<html lang ="vi">
      <head>
        <meta charset = "utf-8">
        <title>Hóa đơn thanh toán</title>
	</head>
      <body>
<h3>HÓA ĐƠN THANH TOÁN</h3>
       <table border = "1">
    <tr>
     <th>STT</th>
     <th>Tên sản phẩm</th>
     <th>Số lượng</th>
     <th>Đơn giá </th>
     <th>Thành tiền</th>
  </tr>
   <tr>
   <td>1</td>
    <td>A</td>
    <td class = "sl"> 3</td>
    <td class = "dg">1000</td>
    <td class = "tt"> </td> 
   </tr>
  <tr>
   <td>2</td>
    <td>B</td>
    <td class = "sl">2</td>
    <td class = "dg">2000</td>
    <td class = "tt"> </td>
  </tr>
  <tr>
   <td>3</td>
    <td>C</td>
    <td class = "sl">4</td>
    <td class = "dg">3000</td>
    <td class = "tt"> </td>  
   </tr>
  <tr>
   <th colspan = "3">Tổng Thanh toán</th>
   <td colspan = "2" id = "tongthanhtoan"></td>
  </tr>
<script>
  const soLuong=document.getElementsByClassName("sl");
  const donGia=document.getElementsByClassName("dg");
  const thanhTien=document.getElementsByClassName("tt");
  let tongthanhtoan=0; 
   for(let i=0; i<donGia.length; i++)
  {
    thanhTien[i].innerHTML=soLuong[i].innerHTML*donGia[i].innerHTML;
    tongthanhtoan += parseInt(thanhTien[i].innerHTML);
  }
	document.getElementById("tongthanhtoan").innerHTML=tongthanhtoan;
</script>

    </table>
      </body>

</html>
